name: Release Sharlayan 9

on:
  workflow_dispatch:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    strategy:
      matrix:
        configuration: [Release]

    runs-on: windows-latest

    env:
      SOLUTION_NAME: Sharlayan
      NUGET_TOKEN: ${{ secrets.NUGET_TOKEN }}

    steps:
      # FFXIVClientStructs is a git submodule that build.ps1 expects to be populated
      # before it hands off to `dotnet build`. submodules: recursive pulls it at
      # checkout time; fetch-depth: 0 is preserved for version-derivation scripts.
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      # Sharlayan + Sharlayan.Tests + Sharlayan.Harness all target net10.0; the
      # FFXIVClientStructs submodule's own projects also target net10.0 / netstandard2.0.
      # Only the current SDK is needed.
      - name: Install .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # Extract <Version> from Sharlayan.csproj. Used by the upload-artifact step so
      # the artifact name tracks the NuGet version being published.
      - name: Get library version
        id: get_version
        shell: pwsh
        run: |
          $csproj = Get-Content -Path .\${{ env.SOLUTION_NAME }}\${{ env.SOLUTION_NAME }}.csproj -Raw
          $match = [regex]::Match($csproj, '<Version>(?<v>[^<]+)</Version>')
          if (-not $match.Success) { throw 'Could not find <Version> in Sharlayan.csproj' }
          $version = $match.Groups['v'].Value
          Write-Host "Library version: $version"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # build.ps1 orchestrates:
      #   1. git submodule sync/update (safe no-op on CI since checkout already pulled).
      #   2. dotnet build on FFXIVClientStructs.csproj → produces FCS DLLs at the
      #      location Sharlayan.csproj references via HintPath.
      #   3. dotnet build on Sharlayan.csproj → ILRepacks FCS into Sharlayan.dll and
      #      auto-packs the .nupkg (GeneratePackageOnBuild=true). The CopyPackages
      #      MSBuild target then drops the .nupkg under .\published\ at the sln root.
      # -SkipSubmoduleUpdate because checkout has already done it; running `git
      # submodule update --remote` under GITHUB_TOKEN can fail if the submodule URL
      # is SSH-flavoured in the .gitmodules file.
      - name: Build (FFXIVClientStructs + Sharlayan + ILRepack + NuGet pack)
        shell: pwsh
        run: ./build.ps1 -Configuration ${{ matrix.configuration }} -SkipSubmoduleUpdate

      # Sharlayan.Harness requires a live FFXIV client (won't run on CI) — the CI test
      # gate is Sharlayan.Tests, pure mapper/extractor logic. At time of writing: 79
      # tests across mapper offset derivation + signature extractor math.
      - name: Run tests
        shell: pwsh
        run: dotnet test Sharlayan.Tests/Sharlayan.Tests.csproj --configuration ${{ matrix.configuration }} --nologo

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sharlayan-${{ steps.get_version.outputs.version }}
          path: |
            published/
          if-no-files-found: error
          overwrite: true

      # Only publish on actual master pushes — not PR events. --skip-duplicate makes
      # re-running the workflow on the same version a no-op instead of an error, so
      # bumping <Version> in Sharlayan.csproj is the trigger for a new NuGet release.
      - name: Publish NuGet packages
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        shell: pwsh
        run: |
          $packages = Get-ChildItem -Path .\published\ -Filter *.nupkg
          if (-not $packages) { throw 'No .nupkg files found under .\published\' }
          foreach ($package in $packages) {
            Write-Host "==> dotnet nuget push $($package.Name)"
            dotnet nuget push $package.FullName `
              --skip-duplicate `
              --api-key ${{ env.NUGET_TOKEN }} `
              --source https://api.nuget.org/v3/index.json
          }
